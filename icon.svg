  </defs>
  <rect x="4" y="4" width="120" height="120" rx="24" fill="url(#bg)"/>
  <g transform="translate(24, 22)">
    <rect x="0" y="0" width="80" height="76" rx="6" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
    <!-- 图片图标 -->
    <rect x="8" y="8" width="40" height="40" rx="4" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <polygon points="12,44 28,24 36,32 44,20 52,44" fill="rgba(255,255,255,0.3)"/>
    <rect x="8" y="8" width="40" height="40" rx="4" fill="rgba(255,255,255,0.05)"/>
    <circle cx="22" cy="22" r="4" fill="rgba(255,255,255,0.4)"/>
    <!-- 工具栏 -->
    <rect x="56" y="8" width="18" height="18" rx="3" fill="rgba(255,255,255,0.2)"/>
